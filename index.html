<!DOCTYPE html>
<html>
<body style="background:black; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-size:5vw; font-family:sans-serif; text-align:center;">
    <div id="display">Loading...</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBVaXjZ7-v24JCWovgnVfJ3o68X-S1gqrqsNzBcW9Ol3ECJL0r29yqAr1OSomBpICeey9BJx2oSsd6/pub?gid=0&single=true&output=csv'; 

        async function startSlideshow() {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            // 1. Extract global duration from F5 (assuming F5 is in the first row after header)
            // If F5 is just the 5th cell in the first row:
            const globalDuration = parseInt(rows[0].split(',')[5]) * 1000;

            // 2. Interleave Column B and C (assuming index 1 and index 2)
            let sequence = [];
            rows.forEach(row => {
                let cols = row.split(',');
                if (cols[1]?.trim()) sequence.push(cols[1].trim()); // Add B
                if (cols[2]?.trim()) sequence.push(cols[2].trim()); // Add C
            });

            // 3. Loop through the sequence
            let index = 0;
            function showNext() {
                document.getElementById('display').innerText = sequence[index];
                index = (index + 1) % sequence.length;
                setTimeout(showNext, globalDuration);
            }
            showNext();
        }
        startSlideshow();
    </script>
</body>
</html>
