<!DOCTYPE html>
<html>
<body style="background:black; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; font-size:5vw; font-family:sans-serif; text-align:center;">
    
    <div id="display" style="margin-bottom: 20px;">Loading...</div>
    <button id="audioToggle" onclick="toggleAudio()" style="padding: 10px 20px; font-size: 2vw; cursor: pointer;">Audio: OFF</button>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBVaXjZ7-v24JCWovgnVfJ3o68X-S1gqrqsNzBcW9Ol3ECJL0r29yqAr1OSomBpICeey9BJx2oSsd6/pub?gid=0&single=true&output=csv'; 
        let audioEnabled = false;

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            document.getElementById('audioToggle').innerText = audioEnabled ? "Audio: ON" : "Audio: OFF";
        }

        async function startSlideshow() {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const globalDuration = parseInt(rows[1].split(',')[6]) * 1000 || 5000;

            let sequence = [];
            rows.forEach(row => {
                let cols = row.split(',');
                // Check Column E (index 4) for TRUE
                if (cols[4]?.trim().toLowerCase() === 'true') {
                    // Part 1: Col C + \n\n + Col A - Col B
                    let side1 = `${cols[2]?.trim()}\n\n${cols[0]?.trim()} - ${cols[1]?.trim()}`;
                    // Part 2: Col D + \n\n + Col A - Col B
                    let side2 = `${cols[3]?.trim()}\n\n${cols[0]?.trim()} - ${cols[1]?.trim()}`;
                    
                    sequence.push(side1);
                    sequence.push(side2);
                }
            });

            let index = 0;
            function showNext() {
                if (sequence.length > 0) {
                    const text = sequence[index];
                    document.getElementById('display').innerText = text;
                    
                    if (audioEnabled) {
                        const utterance = new SpeechSynthesisUtterance(text.replace(/\n/g, ' '));
                        utterance.lang = 'it-IT'; 
                        window.speechSynthesis.speak(utterance);
                    }
                    
                    index = (index + 1) % sequence.length;
                    setTimeout(showNext, globalDuration);
                } else {
                    document.getElementById('display').innerText = "No cards selected.";
                    setTimeout(showNext, 2000);
                }
            }
            showNext();
        }
        startSlideshow();
    </script>
</body>
</html>
